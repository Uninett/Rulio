{% load static %}

<header class="site-header" aria-label="Site header">

    <div class="header-content">
        <div class="header-navigation">
            <img class="site-logo" aria-label="Site logo" src="{% static 'images/rulio.svg' %}" alt="Rulio logo" />
            <nav class="main-nav" aria-label="Main navigation">
                <ul class="nav-list">
                    <li><a href="{% url 'devices' %}"
                            class="{% if active_page == 'devices' %}active{% endif %}">Devices</a>
                    </li>
                    <li><a href="{% url 'filters' %}"
                            class="{% if active_page == 'filters' %}active{% endif %}">Filters</a>
                    </li>
                    <li><a href="{% url 'objects' %}"
                            class="{% if active_page == 'objects' %}active{% endif %}">Objects</a>
                    </li>
                    <li><a href="{% url 'tags' %}" class="{% if active_page == 'tags' %}active{% endif %}">Tags</a></li>
                </ul>
            </nav>
        </div>

        <div class="header-actions">
            <input class="form-control" type="search" name="search" placeholder="Search...">
            <div class="form-group">
                <label for="tenant">Tenant</label>
                <select name="tenant" id="tenant">
                    <option value="ntnu">NTNU</option>
                    <option value="uio">UiO</option>
                    <option value="uib">UiB</option>
                </select>
            </div>
        </div>
    </div>

</header>
<hr>
