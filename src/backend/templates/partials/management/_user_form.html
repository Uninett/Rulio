<input type="hidden" id="initial_is_superuser" value="{{ object_data.is_superuser|default:'' }}">

<div class="form-row">
    <div class="form-group form-group-username">
        <label for="id_username">Username<span class="required"> *</span></label>
        <input type="text" id="id_username" name="username" value="{{ object_data.username|default:'' }}"
            autocomplete="off" required>
    </div>

    <div class="form-group form-group-superuser">
        <div class="superuser-control">
            <span class="superuser-text">Superuser</span>
            <input type="checkbox" id="id_is_superuser" name="is_superuser">
        </div>
    </div>
</div>
<div class="form-group">
    <label for="id_first_name">Name</label>
    <div class="form-row">
        <input type="text" id="id_first_name" name="first_name" value="{{ object_data.first_name|default:'' }}"
            placeholder="First name">
        <input type="text" id="id_last_name" name="last_name" value="{{ object_data.last_name|default:'' }}"
            placeholder="Last name">
    </div>
</div>

<div class="form-group">
    <label for="id_email">Email</label>
    <input type="email" id="id_email" name="email" value="{{ object_data.email|default:'' }}">
</div>

<div class="form-group">
    <label for="id_password">Password<span class="required"> *</span></label>
    <input type="password" id="id_password" name="password" autocomplete="new-password" required>
</div>

{% if modal_mode == "update" %}
<div class="form-group">
    <label></label>
    <p class="form-help">Leave blank to keep current password.</p>
</div>
{% endif %}

<div class=" form-group form-group-tenant" id="tenant-group">
    <label for="id_tenant_id">Tenant</label>
    <select id="id_tenant_id" name="tenant_id">
        <option value="">Select tenant</option>
        {% for tenant in tenant_options %}
        <option value="{{ tenant.id }}">
            {{ tenant.name }}
        </option>
        {% endfor %}
    </select>
</div>

{% if error_message %}
<div class="form-error">
    {{ error_message }}
</div>
{% endif %}

<script>
    (function () {
        const checkbox = document.getElementById("id_is_superuser");
        const tenantGroup = document.getElementById("tenant-group");
        const tenantSelect = document.getElementById("id_tenant_id");
        const initialValue = document.getElementById("initial_is_superuser");

        function isTruthy(value) {
            if (!value) return false;
            const normalized = value.toString().toLowerCase();
            return normalized === "true" || normalized === "1" || normalized === "on";
        }

        function toggleTenantField() {
            if (!checkbox || !tenantGroup || !tenantSelect) return;

            if (checkbox.checked) {
                tenantGroup.style.display = "none";
                tenantSelect.value = "";
            } else {
                tenantGroup.style.display = "";
            }
        }

        if (checkbox && initialValue) {
            checkbox.checked = isTruthy(initialValue.value);
        }

        if (checkbox) {
            checkbox.addEventListener("change", toggleTenantField);
            toggleTenantField();
        }
    })();
</script>
