<div class="form-group">
    <label for="addr_type">Address type</label>
    <select id="addr_type" name="addr_type">
        {% if object_data.addr_type == "host" %}
        <option value="host" selected>Host</option>
        {% else %}
        <option value="host">Host</option>
        {% endif %}

        {% if object_data.addr_type == "network" %}
        <option value="network" selected>Network</option>
        {% else %}
        <option value="network">Network</option>
        {% endif %}

        {% if object_data.addr_type == "range" %}
        <option value="range" selected>Range</option>
        {% else %}
        <option value="range">Range</option>
        {% endif %}
    </select>
</div>

<div class="ip-address">
    <div class="form-group">
        <label for="ip_address">IP Address</label>
        <p class="form-help">
            At least one of IPv4 or IPv6 is required.<span class="required"> *</span>
        </p>
    </div>


    <div class="form-group ip-input-row">
        <label></label>
        <div class="form-group ip-input-group">
            <div class="form-group ip-input">
                <label for="ipv4_input">IPv4</label>
                <input id="ipv4_input" name="ipv4_input" type="text" value="{{ object_data.ipv4_input|default:'' }}"
                    placeholder="x.x.x.x/y or x.x.x.x-x.x.x.x">
            </div>

            <div class="form-group ip-input">
                <label for="ipv6_input">IPv6</label>
                <input id="ipv6_input" name="ipv6_input" type="text" value="{{ object_data.ipv6_input|default:'' }}"
                    placeholder="x:x:x:x:x:x:x:x/y or x:x:x:x:x:x:x:x-x:x:x:x:x:x:x:x">
            </div>
        </div>
    </div>
</div>
