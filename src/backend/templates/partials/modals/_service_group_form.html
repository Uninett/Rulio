<div class="form-row">
    <div class="form-group">
        <label for="name">Name<span class="required"> *</span></label>
        <input id="name" name="name" value="{{ object_data.name }}" type="text" required>
    </div>

    <div class="form-group">
        <label for="type">Type</label>
        <input id="type" name="type_display" type="text" value="Service Group" disabled>
    </div>
</div>

<div class="form-group form-description">
    <label for="description">Description</label>
    <textarea id="description" name="description">{{ object_data.description }}</textarea>
</div>

<hr>

<!-- List all services  as a checkbox dropdown -->
<div class="modal-header">
    <h2 class="checkbox-header">Services</h2>
</div>

<div class="form-group">
    <p class="form-help">Choose any services you want to add to this service group.</p>

    <div class="group-checkbox-list">
        {% for service in item_options %}
        <label class="checkbox-label">
            {% if service.id in selected_service_ids %}
            <input type="checkbox" name="service_ids" value="{{ service.id }}" checked>
            {% else %}
            <input type="checkbox" name="service_ids" value="{{ service.id }}">
            {% endif %}
            <span>{{ service.name }}</span>
        </label>
        {% empty %}
        <p>No services available.</p>
        {% endfor %}
    </div>
</div>
