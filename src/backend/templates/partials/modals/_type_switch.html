<div class="modal-toggle tools-toggle">
    <button type="button" class="btn-toggle {% if modal_type == 'item' %}active{% endif %}"
        hx-get="{% url 'modal-add-form-content' modal_object_type 'item' %}" hx-target="#modal-type-content"
        hx-swap="innerHTML">
        {{ modal_type_labels.item|default:"Item" }}
    </button>

    <button type="button" class="btn-toggle {% if modal_type == 'group' %}active{% endif %}"
        hx-get="{% url 'modal-add-form-content' modal_object_type 'group' %}" hx-target="#modal-type-content"
        hx-swap="innerHTML">
        {{ modal_type_labels.group|default:"Group" }}
    </button>
</div>
