<div class="form-row type-other-row">
    <div class="form-group type-other-name-group">
        <label for="name">Name<span class="required"> *</span></label>
        <input id="name" name="name" value="{{ object_data.name }}" type="text" required>
    </div>

    <div class="form-group type-other-select-group">
        <label for="protocol">Protocol</label>
        <select id="protocol" name="protocol">
            {% if object_data.protocol == "TCP" or not object_data.protocol %}
            <option value="TCP" selected>TCP</option>
            {% else %}
            <option value="TCP">TCP</option>
            {% endif %}

            {% if object_data.protocol == "UDP" %}
            <option value="UDP" selected>UDP</option>
            {% else %}
            <option value="UDP">UDP</option>
            {% endif %}

            {% if object_data.protocol == "ICMP" %}
            <option value="ICMP" selected>ICMP</option>
            {% else %}
            <option value="ICMP">ICMP</option>
            {% endif %}

            {% if object_data.protocol == "ICMPv6" %}
            <option value="ICMPv6" selected>ICMPv6</option>
            {% else %}
            <option value="ICMPv6">ICMPv6</option>
            {% endif %}

            {% if object_data.protocol == "GRE" %}
            <option value="GRE" selected>GRE</option>
            {% else %}
            <option value="GRE">GRE</option>
            {% endif %}

            {% if object_data.protocol == "ESP" %}
            <option value="ESP" selected>ESP</option>
            {% else %}
            <option value="ESP">ESP</option>
            {% endif %}

            {% if object_data.protocol == "AH" %}
            <option value="AH" selected>AH</option>
            {% else %}
            <option value="AH">AH</option>
            {% endif %}

            {% if object_data.protocol == "IP" %}
            <option value="IP" selected>IP</option>
            {% else %}
            <option value="IP">IP</option>
            {% endif %}
        </select>
    </div>
</div>

<div class="form-group form-description">
    <label for="description">Description</label>
    <textarea id="description" name="description">{{ object_data.description }}</textarea>
</div>

<div class="form-row">
    <div class="form-group">
        <label for="port_start">Port Start</label>
        <input id="port_start" name="port_start" value="{{ object_data.port_start }}" type="number">
    </div>

    <div class="form-group">
        <label for="port_end">Port End</label>
        <input id="port_end" name="port_end" value="{{ object_data.port_end }}" type="number">
    </div>
</div>

<hr>

<!-- List all services groups as a checkbox dropdown -->
<div class="modal-header">
    <h2 class="checkbox-header">Service Groups</h2>
</div>
<div class="form-group">
    <p class="form-help">Choose any service groups you want to add this service to.</p>

    <div class="group-checkbox-list">
        {% for group in group_options %}
        <label class="checkbox-label">
            {% if group.id in selected_group_ids %}
            <input type="checkbox" name="group_ids" value="{{ group.id }}" checked>
            {% else %}
            <input type="checkbox" name="group_ids" value="{{ group.id }}">
            {% endif %}
            <span>{{ group.name }}</span>
        </label>
        {% empty %}
        <p>No service groups available.</p>
        {% endfor %}
    </div>
</div>
