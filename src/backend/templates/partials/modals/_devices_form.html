<div class="form-row">
    <div class="form-group">
        <label for="name">Name<span class="required"> *</span></label>
        <input id="name" name="name" type="text" required> <!-- Use required on mandatory fields -->
    </div>

    <div class="form-group">
        <label for="variant">Variant</label>
        <input id="variant" class="variant" name="variant" type="text"
            value="{% if modal_variant == 'item' %}{{ modal_variant_labels.item }}{% else %}{{ modal_variant_labels.group }}{% endif %}"" disabled>
    </div>
</div>

<div class=" form-group">
        <label for="description">Description</label>
        <textarea id="description" name="description"></textarea>
    </div>
