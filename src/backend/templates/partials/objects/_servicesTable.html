<section class="table-container">
    <table>
        <thead>
            <tr>
                {% for header in services.headers %}
                <th>{{ header }}</th>
                {% endfor %}
            </tr>
        </thead>
        <tbody>
            {% for row in services.rows %}
            {% include "partials/objects/_tableRow.html" with row=row headers=services.headers%}
            {% endfor %}
        </tbody>
    </table>
</section>
