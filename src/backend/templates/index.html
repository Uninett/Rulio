<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>htmx Frontend</title>

    <!-- Loads the local htmx library from the frontend static/js folder -->
    <script src="/static/js/htmx.min.js"></script>
    <link rel="stylesheet" href="/static/css/styles.css" />
</head>

<body>
    <header class="site-header" aria-label="Site header">
        <img class="site-logo" aria-label="Site logo" src="/static/images/rulio.svg" alt="Rulio logo" />
        
        <div class="header-content">
            <nav class="main-nav" aria-label="Main navigation">
            <ul class="nav-list">
                <li><a href="/devices">Devices</a></li>
                <li><a href="/filters">Filters</a></li>
                <li><a href="/objects">Objects</a></li>
                <li><a href="/tags">Tags</a></li>
            </ul>
            </nav>

            <div class="header-actions">
                <input class="form-control" type="search"
                name="search" placeholder="Search..."
                hx-post="/search"
                hx-trigger="input changed delay:500ms, keyup[key=='Enter'], load"
                hx-target="#search-results"
                hx-indicator=".htmx-indicator">
            
                <div class="form-group">
                    <label >Tenant</label>
                    <select name="tenant" hx-get="/tenants" hx-target="#tenants" hx-indicator=".htmx-indicator">
                    <option value="ntnu">NTNU</option>
                    <option value="uio">UiO</option>
                    <option value="uib">UiB</option>
                    </select>
                </div>
            </div>
        </div>

    </header>
    <hr>
</body>
</html>
