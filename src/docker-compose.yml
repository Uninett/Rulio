services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/backend
    environment:
      - DEBUG=1
      - SECRET_KEY=your-local-dev-secret-key
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: "mydatabase"
      POSTGRES_USER: "myuser"
      POSTGRES_PASSWORD: "mypassword"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres_data: