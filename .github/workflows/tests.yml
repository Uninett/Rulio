# .github/workflows/tests.yml
name: Run pytest with Docker Compose

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show files
        run: ls -la src

      - name: Create .env file
        run: |
          echo "DATABASE_NAME=test_db" > src/.env
          echo "DATABASE_USER=test_user" >> src/.env
          echo "DATABASE_PASS=test_password" >> src/.env
          echo "SECRET_KEY=your_secret_key" >> src/.env
          echo "DJANGO_SUPERUSER_USERNAME=admin" >> src/.env
          echo "DJANGO_SUPERUSER_PASSWORD=adminpassword" >> src/.env
          echo "DJANGO_SUPERUSER_EMAIL=admin@example.com" >> src/.env

      - name: Build and start containers
        run: docker compose -f src/docker-compose.yml up -d --build

      - name: Wait for startup
        run: sleep 10

      - name: Show container status
        run: docker compose -f src/docker-compose.yml ps

      - name: Show logs
        run: docker compose -f src/docker-compose.yml logs

      - name: Run tests with coverage
        run: docker compose -f src/docker-compose.yml exec -T web pytest --cov=backend --cov-report=xml

      - name: Upload coverage reports to Codecov
        if: github.repository_owner == 'Uninett'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          verbose: true
          files: src/coverage.xml

      - name: Stop containers
        if: always()
        run: docker compose -f src/docker-compose.yml down -v